<svg width="1040" height="320" viewBox="0 0 1040 320" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1040" height="320" fill="#0f172a"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="80" x2="1040" y2="80" stroke="#1e293b" stroke-width="1"/>
  <line x1="0" y1="160" x2="1040" y2="160" stroke="#1e293b" stroke-width="1"/>
  <line x1="0" y1="240" x2="1040" y2="240" stroke="#1e293b" stroke-width="1"/>
  <line x1="260" y1="0" x2="260" y2="320" stroke="#1e293b" stroke-width="1"/>
  <line x1="520" y1="0" x2="520" y2="320" stroke="#1e293b" stroke-width="1"/>
  <line x1="780" y1="0" x2="780" y2="320" stroke="#1e293b" stroke-width="1"/>

  <!-- Accent bar top -->
  <rect width="1040" height="3" fill="#6366f1"/>

  <!-- Step 1: Research -->
  <rect x="44" y="110" width="160" height="100" rx="10" fill="#1e293b" stroke="#6366f1" stroke-width="1.5"/>
  <text x="124" y="148" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#6366f1" text-anchor="middle" letter-spacing="2">RESEARCH</text>
  <text x="124" y="170" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">News · Filings</text>
  <text x="124" y="188" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">IR Pages · Trends</text>

  <!-- Arrow 1 -->
  <line x1="208" y1="160" x2="250" y2="160" stroke="#334155" stroke-width="1.5"/>
  <polygon points="250,155 262,160 250,165" fill="#334155"/>

  <!-- Step 2: Summarise -->
  <rect x="266" y="110" width="160" height="100" rx="10" fill="#1e293b" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="346" y="148" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#8b5cf6" text-anchor="middle" letter-spacing="2">SUMMARISE</text>
  <text x="346" y="170" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">5–7 Insights</text>
  <text x="346" y="188" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">Key Facts · Gaps</text>

  <!-- Arrow 2 -->
  <line x1="430" y1="160" x2="472" y2="160" stroke="#334155" stroke-width="1.5"/>
  <polygon points="472,155 484,160 472,165" fill="#334155"/>

  <!-- Step 3: Generate -->
  <rect x="488" y="110" width="160" height="100" rx="10" fill="#1e293b" stroke="#f97316" stroke-width="1.5"/>
  <text x="568" y="148" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#f97316" text-anchor="middle" letter-spacing="2">GENERATE</text>
  <text x="568" y="170" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">3–5 Step Sequence</text>
  <text x="568" y="188" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">Per-Contact · Cited</text>

  <!-- Arrow 3 -->
  <line x1="652" y1="160" x2="694" y2="160" stroke="#334155" stroke-width="1.5"/>
  <polygon points="694,155 706,160 694,165" fill="#334155"/>

  <!-- Step 4: Approve -->
  <rect x="710" y="110" width="160" height="100" rx="10" fill="#1e293b" stroke="#16a34a" stroke-width="1.5"/>
  <text x="790" y="148" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#16a34a" text-anchor="middle" letter-spacing="2">APPROVE</text>
  <text x="790" y="170" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">HITL via Telegram</text>
  <text x="790" y="188" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">Save to Sheets</text>

  <!-- Arrow 4 -->
  <line x1="874" y1="160" x2="916" y2="160" stroke="#334155" stroke-width="1.5"/>
  <polygon points="916,155 928,160 916,165" fill="#334155"/>

  <!-- Step 5: Outreach -->
  <rect x="932" y="110" width="64" height="100" rx="10" fill="#16a34a" fill-opacity="0.15" stroke="#16a34a" stroke-width="1.5"/>
  <text x="964" y="155" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10" fill="#16a34a" text-anchor="middle" letter-spacing="1">SENT</text>
  <text x="964" y="173" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18" fill="#16a34a" text-anchor="middle">✓</text>

  <!-- Title -->
  <text x="520" y="52" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="22" font-weight="600" fill="#f1f5f9" text-anchor="middle" letter-spacing="-0.5">Research Outreach Agent</text>

  <!-- Subtitle -->
  <text x="520" y="76" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="13" fill="#64748b" text-anchor="middle">Financial intelligence · Personalised outreach · Human approval · Google Sheets</text>

  <!-- Bottom label -->
  <text x="520" y="280" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#334155" text-anchor="middle" letter-spacing="3">OPENCLAW GATEWAY · LOBSTER PIPELINE · TELEGRAM</text>

  <!-- Accent bar bottom -->
  <rect y="317" width="1040" height="3" fill="#6366f1"/>
</svg>
